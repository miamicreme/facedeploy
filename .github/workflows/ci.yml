name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check app Python files compile
        run: python3 -m py_compile app/*.py

      - name: Check shell scripts parse (bash -n)
        run: |
          for f in scripts/*.sh; do
            echo "Checking $f"
            bash -n "$f"
          done

      - name: Lint shell scripts (shellcheck)
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./scripts"

      - name: Lint Dockerfile (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          # DL3008/DL3013 (unpinned apt/pip versions) are pre-existing,
          # repo-wide practice for this image, not something this smoke
          # test is trying to newly enforce.
          ignore: DL3008,DL3013

      - name: Validate docker-compose.yml
        run: docker compose config -q
