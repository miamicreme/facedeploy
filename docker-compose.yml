services:
  facedeploy:
    build: .
    image: facedeploy:local
    ports:
      - "3000:3000"
      - "7860:7860"
      - "8188:8188"
    volumes:
      - ./workspace:/workspace
    environment:
      APP_MODE: backend
      APP_PORT: 3000
      FACEFUSION_PORT: 7860
      COMFYUI_PORT: 8188
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
