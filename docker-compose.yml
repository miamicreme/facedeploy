services:
  comfyui:
    build: .
    image: facedeploy:latest
    ports:
      - "8188:8188"
    volumes:
      - ./models:/workspace/ComfyUI/models
      - ./input:/workspace/ComfyUI/input
      - ./output:/workspace/ComfyUI/output
      - ./workflows:/workspace/ComfyUI/user/default/workflows
    environment:
      AUTO_DOWNLOAD_MODELS: "false"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
