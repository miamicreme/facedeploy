services:
  facedeploy:
    build: .
    image: facedeploy:latest
    ports:
      - "3000:3000"
      - "7860:7860"
      - "8188:8188"
    volumes:
      - ./workspace:/workspace
    environment:
      APP_MODE: all
      APP_PORT: 3000
      COMFYUI_PORT: 8188
      # All ports are behind nginx basic auth; set your own credentials here
      # instead of relying on the randomly generated one printed to logs.
      FACEDEPLOY_USER: facedeploy
      FACEDEPLOY_PASSWORD: change-me
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
